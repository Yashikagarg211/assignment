services:
  - type: web
    name: flipkart-clone-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false          # set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your Netlify URL after deploy
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000         # Render assigns port via $PORT; 10000 is its default
