services:
  - type: web
    name: flipkart-clone-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
